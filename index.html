<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Light gray background */
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <header class="border-b border-gray-200 bg-white sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-100 border border-emerald-200 flex items-center justify-center text-emerald-600 text-xl font-bold">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <h1 class="font-outfit text-gray-900 font-bold text-lg leading-none">Client Tracker</h1>
                    <span class="text-xs text-gray-500 font-medium tracking-wider uppercase">CRM & Directory</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="exportData()" class="px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-sm font-semibold text-gray-700 transition flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-file-pdf text-red-500"></i> Export PDF
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-grow flex flex-col gap-8">
        
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white border border-gray-200 p-5 rounded-2xl flex items-center gap-4 shadow-sm">
                <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center text-blue-600 text-xl">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div>
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Total Logs</span>
                    <h3 id="stat-total" class="font-outfit text-gray-900 text-2xl font-bold mt-0.5">0</h3>
                </div>
            </div>
            
            <div class="bg-white border border-gray-200 p-5 rounded-2xl flex items-center gap-4 shadow-sm">
                <div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600 text-xl">
                    <i class="fa-solid fa-paper-plane"></i>
                </div>
                <div>
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Pitched Logs</span>
                    <h3 id="stat-pitches" class="font-outfit text-gray-900 text-2xl font-bold mt-0.5">0</h3>
                </div>
            </div>

            <div class="bg-white border border-gray-200 p-5 rounded-2xl flex items-center gap-4 shadow-sm">
                <div class="w-12 h-12 rounded-xl bg-purple-100 flex items-center justify-center text-purple-600 text-xl">
                    <i class="fa-solid fa-dollar-sign"></i>
                </div>
                <div>
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Paid Clients</span>
                    <h3 id="stat-paid" class="font-outfit text-gray-900 text-2xl font-bold mt-0.5">0</h3>
                </div>
            </div>

            <div class="bg-white border border-emerald-200 p-5 rounded-2xl flex items-center gap-4 shadow-sm relative overflow-hidden">
                <div class="absolute inset-0 bg-emerald-50 pointer-events-none"></div>
                <div class="w-12 h-12 rounded-xl bg-emerald-100 flex items-center justify-center text-emerald-600 text-xl relative z-10 border border-emerald-200">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <div class="relative z-10">
                    <span class="text-xs text-emerald-700 font-bold uppercase tracking-wider">Agreed Deals</span>
                    <h3 id="stat-agreed" class="font-outfit text-gray-900 text-2xl font-bold mt-0.5">0 <span class="text-sm font-normal text-gray-500">/ Target: 10</span></h3>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white border border-gray-200 p-6 rounded-2xl shadow-sm">
                    <h2 class="font-outfit text-gray-900 text-lg font-semibold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-plus text-emerald-500"></i> Log a New Prospect
                    </h2>
                    <form id="lead-form" onsubmit="addLead(event)" class="flex flex-col gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Business Name *</label>
                            <input type="text" id="business-name" required placeholder="e.g. Westlands Auto Garage" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Contact Person</label>
                                <input type="text" id="contact-name" placeholder="e.g. John" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Platform Channel</label>
                                <select id="platform" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
                                    <option value="Instagram">Instagram DM</option>
                                    <option value="Google Maps">Google Maps</option>
                                    <option value="WhatsApp">WhatsApp</option>
                                    <option value="Cold Email">Cold Email</option>
                                    <option value="TikTok">TikTok</option>
                                    <option value="Facebook">Facebook</option>
                                    <option value="Reddit">Reddit</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Contact Handle / Phone Number</label>
                            <input type="text" id="contact-handle" placeholder="e.g. @username or +254..." class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Initial Status</label>
                                <select id="status" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
                                    <option value="Lead">Lead Only</option>
                                    <option value="Pitched">Pitched</option>
                                    <option value="Delivered">Delivered</option>
                                    <option value="Seen">Seen</option>
                                    <option value="Rejected">Rejected</option>
                                    <option value="Agreed">Agreed</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Payment Status</label>
                                <select id="payment" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
                                    <option value="Unpaid">❌ Unpaid</option>
                                    <option value="Paid">✅ Paid</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Notes / Target Gap Details</label>
                            <textarea id="notes" rows="3" placeholder="e.g. Needs Google Business profile optimisation and a landing page." class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition"></textarea>
                        </div>
                        <button type="submit" class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold text-sm rounded-lg shadow-sm transition duration-200 flex items-center justify-center gap-2 mt-2">
                            <i class="fa-solid fa-floppy-disk"></i> Save to Directory
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <div class="flex flex-col xl:flex-row items-start xl:items-center justify-between gap-4">
                    <h2 class="font-outfit text-gray-900 text-lg font-semibold">Client Directory</h2>
                    
                    <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto">
                        <select id="filter-channel" onchange="render()" class="w-full sm:w-auto bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:border-emerald-500 transition shadow-sm">
                            <option value="All">All Channels</option>
                            <option value="Instagram">Instagram</option>
                            <option value="Google Maps">Google Maps</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Cold Email">Cold Email</option>
                            <option value="TikTok">TikTok</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Reddit">Reddit</option>
                        </select>

                        <select id="filter-status" onchange="render()" class="w-full sm:w-auto bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:border-emerald-500 transition shadow-sm">
                            <option value="All">All Statuses</option>
                            <option value="Lead">Lead Only</option>
                            <option value="Pitched">Pitched</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Seen">Seen</option>
                            <option value="Rejected">Rejected</option>
                            <option value="Agreed">Agreed</option>
                        </select>

                        <div class="flex items-center gap-2 w-full sm:w-auto">
                            <i class="fa-solid fa-magnifying-glass text-gray-400 absolute ml-3"></i>
                            <input type="text" id="search" oninput="render()" placeholder="Search clients..." class="w-full sm:w-64 bg-white border border-gray-300 rounded-lg pl-9 pr-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-emerald-500 transition shadow-sm">
                        </div>
                    </div>
                </div>

                <div id="view-table" class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-200">
                                    <th class="p-4">Business & Contact</th>
                                    <th class="p-4">Handle / Number</th>
                                    <th class="p-4">Channel</th>
                                    <th class="p-4">Status</th>
                                    <th class="p-4">Payment</th>
                                </tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="status-modal" class="fixed inset-0 z-50 bg-gray-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white border border-gray-200 shadow-xl rounded-2xl w-full max-w-2xl p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 transition bg-gray-100 hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="font-outfit text-gray-900 text-lg font-bold mb-6">View & Edit Client Details</h3>
            
            <div class="flex flex-col gap-4">
                <input type="hidden" id="modal-lead-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Business Name</label>
                        <input type="text" id="modal-business" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Contact Person</label>
                        <input type="text" id="modal-contact" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Platform Channel</label>
                        <select id="modal-channel" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500">
                            <option value="Instagram">Instagram DM</option>
                            <option value="Google Maps">Google Maps</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Cold Email">Cold Email</option>
                            <option value="TikTok">TikTok</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Reddit">Reddit</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Handle / Number</label>
                        <input type="text" id="modal-handle" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Current Status Stage</label>
                        <select id="modal-status" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500">
                            <option value="Lead">Lead Logged</option>
                            <option value="Pitched">Pitched</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Seen">Seen</option>
                            <option value="Rejected">Rejected</option>
                            <option value="Agreed">Agreed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Payment Status</label>
                        <select id="modal-payment" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500">
                            <option value="Unpaid">❌ Unpaid</option>
                            <option value="Paid">✅ Paid</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Notes / Details</label>
                    <textarea id="modal-notes" rows="4" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-emerald-500"></textarea>
                </div>

                <div class="border-t border-gray-200 pt-5 mt-2 flex justify-between items-center">
                    <button onclick="deleteLead()" class="px-4 py-2 text-sm font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition border border-red-200">
                        <i class="fa-solid fa-trash-can mr-1"></i> Delete Client
                    </button>
                    <button onclick="saveModalChanges()" class="px-6 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold text-sm rounded-lg transition shadow-sm">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultLeads = [];

        let leads = [];

        function init() {
            const saved = localStorage.getItem('client_tracker_leads_v7');
            if (saved) {
                leads = JSON.parse(saved);
            } else {
                leads = defaultLeads;
                localStorage.setItem('client_tracker_leads_v7', JSON.stringify(leads));
            }
            render();
        }

        function save() {
            localStorage.setItem('client_tracker_leads_v7', JSON.stringify(leads));
            render();
        }

        function addLead(e) {
            e.preventDefault();
            const newLead = {
                id: Date.now(),
                business: document.getElementById('business-name').value.trim(),
                contact: document.getElementById('contact-name').value.trim() || "N/A",
                handle: document.getElementById('contact-handle').value.trim() || "None listed",
                channel: document.getElementById('platform').value,
                notes: document.getElementById('notes').value.trim() || "No customised notes logged.",
                status: document.getElementById('status').value,
                payment: document.getElementById('payment').value
            };
            leads.push(newLead);
            save();
            document.getElementById('lead-form').reset();
        }

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const filterChannel = document.getElementById('filter-channel').value;
            const filterStatus = document.getElementById('filter-status').value;

            const filtered = leads.filter(l => {
                const matchesSearch = l.business.toLowerCase().includes(query) || l.handle.toLowerCase().includes(query) || l.contact.toLowerCase().includes(query);
                const matchesChannel = filterChannel === 'All' || l.channel === filterChannel;
                const matchesStatus = filterStatus === 'All' || l.status === filterStatus;
                
                return matchesSearch && matchesChannel && matchesStatus;
            });

            document.getElementById('stat-total').innerText = leads.length;
            document.getElementById('stat-pitches').innerText = leads.filter(l => l.status !== 'Lead').length;
            document.getElementById('stat-paid').innerText = leads.filter(l => l.payment === 'Paid').length;
            
            const agreedCount = leads.filter(l => l.status === 'Agreed').length;
            document.getElementById('stat-agreed').innerHTML = `${agreedCount} <span class="text-sm font-normal text-gray-500">/ Target: 10</span>`;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500 text-sm">No clients found matching your filters.</td></tr>`;
                return;
            }

            filtered.forEach(lead => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50 transition text-xs sm:text-sm cursor-pointer";
                tr.onclick = () => openModal(lead.id);
                tr.innerHTML = `
                    <td class="p-4">
                        <div class="font-outfit text-gray-900 font-semibold">${lead.business}</div>
                        <div class="text-xs text-gray-500">Contact: ${lead.contact}</div>
                    </td>
                    <td class="p-4 text-gray-600 font-mono text-xs">${lead.handle}</td>
                    <td class="p-4"><span class="text-xs px-2.5 py-1 rounded-md font-medium border ${getChannelColor(lead.channel)}">${lead.channel}</span></td>
                    <td class="p-4"><span class="text-xs px-2.5 py-1 rounded-md font-medium ${getStatusColor(lead.status)}">${lead.status}</span></td>
                    <td class="p-4 font-bold text-xs ${lead.payment === 'Paid' ? 'text-emerald-600' : 'text-gray-400'}">${lead.payment === 'Paid' ? '✅ Paid' : '❌ Unpaid'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getChannelColor(c) {
            if (c === 'Instagram') return 'bg-pink-50 text-pink-700 border-pink-200';
            if (c === 'Google Maps') return 'bg-blue-50 text-blue-700 border-blue-200';
            if (c === 'WhatsApp') return 'bg-emerald-50 text-emerald-700 border-emerald-200';
            if (c === 'TikTok') return 'bg-gray-100 text-gray-800 border-gray-300';
            if (c === 'Facebook') return 'bg-indigo-50 text-indigo-700 border-indigo-200';
            if (c === 'Reddit') return 'bg-orange-50 text-orange-700 border-orange-200';
            return 'bg-purple-50 text-purple-700 border-purple-200';
        }

        function getStatusColor(s) {
            if (s === 'Lead') return 'bg-blue-100 text-blue-700';
            if (s === 'Pitched') return 'bg-cyan-100 text-cyan-700';
            if (s === 'Delivered') return 'bg-yellow-100 text-yellow-800';
            if (s === 'Seen') return 'bg-rose-100 text-rose-700';
            if (s === 'Rejected') return 'bg-gray-200 text-gray-600 line-through';
            if (s === 'Agreed') return 'bg-emerald-100 text-emerald-700 font-bold';
            return 'bg-gray-100 text-gray-700';
        }

        function openModal(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;
            document.getElementById('modal-lead-id').value = id;
            document.getElementById('modal-business').value = lead.business;
            document.getElementById('modal-contact').value = lead.contact;
            document.getElementById('modal-channel').value = lead.channel;
            document.getElementById('modal-handle').value = lead.handle;
            document.getElementById('modal-status').value = lead.status;
            document.getElementById('modal-payment').value = lead.payment;
            document.getElementById('modal-notes').value = lead.notes;
            
            document.getElementById('status-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('status-modal').classList.add('hidden');
        }

        function saveModalChanges() {
            const id = parseInt(document.getElementById('modal-lead-id').value);
            const lead = leads.find(l => l.id === id);
            if (lead) {
                lead.business = document.getElementById('modal-business').value.trim();
                lead.contact = document.getElementById('modal-contact').value.trim();
                lead.channel = document.getElementById('modal-channel').value;
                lead.handle = document.getElementById('modal-handle').value.trim();
                lead.status = document.getElementById('modal-status').value;
                lead.payment = document.getElementById('modal-payment').value;
                lead.notes = document.getElementById('modal-notes').value.trim();
                save();
            }
            closeModal();
        }

        function deleteLead() {
            if (confirm("Permanently erase this client log?")) {
                const id = parseInt(document.getElementById('modal-lead-id').value);
                leads = leads.filter(l => l.id !== id);
                save();
                closeModal();
            }
        }

        function exportData() {
            if (!window.jspdf || !window.jspdf.jsPDF) {
                alert("PDF library is still loading. Please try again in a moment.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text("Client Tracker Directory", 14, 22);
            doc.setFontSize(11);
            doc.setTextColor(100);
            
            // Format the date using British standard
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            doc.text(`Generated on: ${dateStr}`, 14, 30);

            const tableColumn = ["Business", "Contact", "Channel", "Handle/Number", "Status", "Payment"];
            const tableRows = [];

            leads.forEach(lead => {
                const leadData = [
                    lead.business,
                    lead.contact,
                    lead.channel,
                    lead.handle,
                    lead.status,
                    lead.payment
                ];
                tableRows.push(leadData);
            });

            doc.autoTable({
                head: [tableColumn],
                body: tableRows,
                startY: 35,
                theme: 'grid',
                styles: { fontSize: 9, cellPadding: 3 },
